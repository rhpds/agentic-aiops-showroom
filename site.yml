---
site:
  title: "LB2645: Agentic DevOps"
  url: https://github.com/rhpds/agentic-aiops-showroom
  start_page: modules::index.adoc

content:
  sources:
    - url: .
      start_path: content

ui:
  bundle:
    url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/rh-summit-2025/ui-bundle.zip
    snapshot: true
  supplemental_files:
    - path: ./content/supplemental-ui
    - path: partials/footer-scripts.hbs
      contents: |
        <script src="{{uiRootPath}}/js/vendor/clipboard.js"></script>
        <script src="{{uiRootPath}}/js/site.js"></script>
        <script async src="{{uiRootPath}}/js/vendor/highlight.js"></script>
        <script>
        /* Lightbox for images and Mermaid diagrams */
        document.addEventListener('DOMContentLoaded', function () {
          function addHints() {
            document.querySelectorAll('.imageblock, .mermaid').forEach(function (el) {
              if (el.querySelector('.lightbox-hint')) return;
              if (el.classList.contains('mermaid') && !el.querySelector('svg')) return;
              var hint = document.createElement('span');
              hint.className = 'lightbox-hint';
              hint.textContent = '🔍 Click to enlarge';
              el.appendChild(hint);
            });
          }
          function openLightbox(content) {
            var overlay = document.createElement('div');
            overlay.className = 'lightbox-overlay';
            var close = document.createElement('span');
            close.className = 'lightbox-close';
            close.innerHTML = '&times;';
            overlay.appendChild(close);
            overlay.appendChild(content);
            document.body.appendChild(overlay);
            document.body.style.overflow = 'hidden';
            function dismiss() {
              overlay.remove();
              document.body.style.overflow = '';
            }
            overlay.addEventListener('click', dismiss);
            document.addEventListener('keydown', function esc(e) {
              if (e.key === 'Escape') { dismiss(); document.removeEventListener('keydown', esc); }
            });
          }
          document.addEventListener('click', function (e) {
            var img = e.target.closest('.imageblock img');
            if (img) { e.preventDefault(); var clone = img.cloneNode(true); clone.style.transform = 'none'; openLightbox(clone); return; }
            var svg = e.target.closest('.mermaid svg');
            if (svg) { var clone = svg.cloneNode(true); clone.style.transform = 'none'; openLightbox(clone); }
          });
          addHints();
          new MutationObserver(addHints).observe(document.body, { childList: true, subtree: true });
        });
        </script>
    - path: partials/head-styles.hbs
      contents: |
        <link rel="stylesheet" href="{{{uiRootPath}}}/css/site.css">
        <style>
        /* Lightbox: clickable images and diagrams */
        .imageblock img, .mermaid svg {
          cursor: zoom-in;
          transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .imageblock img:hover, .mermaid svg:hover {
          transform: scale(1.02);
          box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .lightbox-hint {
          position: absolute;
          bottom: 8px;
          right: 8px;
          background: rgba(0,0,0,0.55);
          color: #fff;
          font-size: 12px;
          padding: 3px 8px;
          border-radius: 4px;
          opacity: 0;
          transition: opacity 0.2s ease;
          pointer-events: none;
          z-index: 1;
        }
        .imageblock, .mermaid {
          position: relative;
        }
        .imageblock:hover .lightbox-hint,
        .mermaid:hover .lightbox-hint {
          opacity: 1;
        }
        .lightbox-overlay {
          position: fixed;
          inset: 0;
          background: rgba(0,0,0,0.85);
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          cursor: zoom-out;
          padding: 2rem;
        }
        .lightbox-overlay img,
        .lightbox-overlay svg {
          max-width: 95vw;
          max-height: 92vh;
          background: #fff;
          border-radius: 6px;
          padding: 1rem;
          box-shadow: 0 4px 30px rgba(0,0,0,0.4);
        }
        .lightbox-close {
          position: fixed;
          top: 1rem;
          right: 1.5rem;
          color: #fff;
          font-size: 2rem;
          cursor: pointer;
          z-index: 10000;
          line-height: 1;
        }
        </style>

antora:
  extensions:
    - '@sntke/antora-mermaid-extension'

asciidoc:
  attributes:
    experimental: true
    page-pagination: true
    showroom-collection-version: v1.6.8
    guid: replace-me
    openshift_console_url@: https://console-openshift-console.apps.cluster-GUID.opentlc.com
    openshift_cluster_ingress_domain@: apps.cluster-GUID.opentlc.com
    aap2_url@: https://aap-aap.apps.cluster-GUID.opentlc.com
    aap2_username@: user-GUID-agentic
    aap2_password@: replace-me
    kira_url@: https://kira-frontend-user-GUID-agentic.apps.cluster-GUID.opentlc.com
    kira_username@: user-GUID
    kira_password@: replace-me
    rocketchat_url@: https://rocketchat-user-GUID-agentic.apps.cluster-GUID.opentlc.com
    athena_url@: https://athena-user-GUID-agentic.apps.cluster-GUID.opentlc.com
    gitea_url@: https://gitea.apps.cluster-GUID.opentlc.com
    gitea_username@: user-GUID

output:
  dir: ./www
